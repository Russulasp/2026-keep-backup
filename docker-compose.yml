services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      KEEP_BROWSER_PROFILE_DIR: /keep-profile
      UV_PROJECT_ENVIRONMENT: /opt/venv
    volumes:
      - ./:/app
      - ${KEEP_BROWSER_PROFILE_DIR:-./.docker/keep-profile}:/keep-profile
    command: sleep infinity
    tty: true
    stdin_open: true
